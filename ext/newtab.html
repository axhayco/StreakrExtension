<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #06131f;
            --panel: rgba(15, 23, 42, 0.88);
            --panel-border: rgba(56, 189, 248, 0.18);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #38bdf8;
            --accent-strong: #0ea5e9;
            --success: #22c55e;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #ffffff;
            color: var(--text);
        }

        .card {
            display: none;
            width: min(100%, 720px);
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 24px 60px rgba(2, 6, 23, 0.45);
            backdrop-filter: blur(12px);
        }

        .eyebrow {
            margin: 0 0 8px;
            color: var(--accent);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: clamp(30px, 4vw, 42px);
            line-height: 1.05;
        }

        .subtitle {
            margin: 12px 0 0;
            color: var(--muted);
            font-size: 16px;
            line-height: 1.6;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-top: 28px;
        }

        .stat {
            border-radius: 18px;
            padding: 18px;
            background: rgba(15, 23, 42, 0.72);
            border: 1px solid rgba(148, 163, 184, 0.14);
        }

        .stat-label {
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
        }

        .problem {
            margin-top: 20px;
            border-radius: 20px;
            padding: 22px;
            background: rgba(8, 47, 73, 0.45);
            border: 1px solid rgba(56, 189, 248, 0.22);
        }

        .problem-label {
            margin: 0 0 8px;
            color: var(--muted);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .problem-title {
            margin: 0;
            font-size: clamp(24px, 3vw, 32px);
        }

        .problem-meta {
            margin-top: 10px;
            color: var(--muted);
            font-size: 14px;
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 24px;
        }

        button {
            border: none;
            border-radius: 999px;
            padding: 14px 22px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 120ms ease, background 120ms ease, opacity 120ms ease;
        }

        button:hover {
            transform: translateY(-1px);
        }

        .primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            color: #082032;
        }

        .secondary {
            background: rgba(15, 23, 42, 0.72);
            color: var(--text);
            border: 1px solid rgba(148, 163, 184, 0.18);
        }

        .hidden {
            display: none;
        }

        .status {
            margin-top: 18px;
            color: var(--success);
            font-size: 14px;
            font-weight: 600;
        }

        .muted {
            color: var(--muted);
        }

        .card.is-full {
            display: block;
            margin: 28px auto;
        }

        .card.is-nudge {
            display: block;
            position: fixed;
            top: 20px;
            right: 20px;
            width: min(320px, calc(100vw - 32px));
            padding: 20px;
            border-radius: 20px;
            background: #ffffff;
            border: 1px solid rgba(148, 163, 184, 0.28);
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.14);
            backdrop-filter: none;
            color: #0f172a;
        }

        .card.is-nudge .eyebrow,
        .card.is-nudge .subtitle,
        .card.is-nudge .problem-meta,
        .card.is-nudge .stat-label {
            color: #64748b;
        }

        .card.is-nudge .problem {
            margin-top: 14px;
            padding: 16px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
        }

        .card.is-nudge .problem-title,
        .card.is-nudge h1,
        .card.is-nudge .stat-value {
            color: #0f172a;
        }

        .card.is-nudge .primary {
            color: #ffffff;
        }

        .toggle {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 20;
            border: 1px solid rgba(148, 163, 184, 0.28);
            background: rgba(255, 255, 255, 0.92);
            color: #0f172a;
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.12);
            backdrop-filter: blur(8px);
        }

        .toggle.visible {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>
    <button class="toggle" id="nudgeToggle">Streakr</button>
    <main class="card">
        <p class="eyebrow">Daily Dashboard</p>
        <h1 id="headline">Today's assigned LeetCode problem</h1>
        <p class="subtitle" id="subtitle">Your next session is one click away.</p>

        <section class="stats">
            <div class="stat">
                <div class="stat-label">Current Streak</div>
                <div class="stat-value" id="streakValue">0 days</div>
            </div>
            <div class="stat">
                <div class="stat-label">Target Difficulty</div>
                <div class="stat-value" id="difficultyValue">Easy</div>
            </div>
        </section>

        <section class="problem">
            <p class="problem-label">Assigned Problem</p>
            <h2 class="problem-title" id="problemTitle">Loading...</h2>
            <div class="problem-meta" id="problemMeta">Checking today's assignment...</div>
            <div class="status hidden" id="statusText"></div>
        </section>

        <div class="actions">
            <button class="primary" id="startNowBtn">Start Now</button>
            <button class="secondary hidden" id="activateBtn">Later</button>
        </div>
    </main>

    <script src="newtab.js"></script>
</body>
</html>
